<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #1a1a1a;
    --white: #f4f2ed;
    --grey: #6b6b6b;
    --mono: "IBM Plex Mono", monospace;
    --sans: "IBM Plex Sans", system-ui, sans-serif;
  }

  body {
    font-family: var(--sans);
    font-size: 14px;
    color: var(--black);
    background: var(--white);
    margin: 0;
    padding: 0 60px;
  }

  /* ── HEADER ── */
  header {
    padding: 0.75rem 0;
  }

  .site-name {
    font-size: 1.4rem;
    font-weight: bold;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .site-name a { color: inherit; text-decoration: none; }
  .site-name a:hover { color: var(--grey); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    padding: 2px;
  }

  .grid-item-link {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
  }

  .grid-item-image {
    aspect-ratio: 1;
    overflow: hidden;
  }

  .grid-item-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .grid-item-label {
    padding: 0.35rem 0 0.5rem;
    font-family: var(--mono);
  }

  .label-title {
    font-size: 0.72rem;
  }

  .grid-item-link:hover .label-title {
    background: var(--black);
    color: var(--white);
  }

  .label-industry { display: none; }

  /* ── FOOTER ── */
  footer {
    padding: 0.5rem 0;
    font-size: 0.75rem;
    color: var(--grey);
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-top: 2px;
  }

  footer nav {
    display: flex;
    gap: 1.5rem;
    font-family: var(--mono);
    font-size: 0.8rem;
  }

  footer nav a { color: var(--black); text-decoration: none; }
  footer nav a:hover { background: var(--black); color: var(--white); }

  .footer-bottom {
    display: flex;
    align-items: center;
    gap: 16px;
  }
</style>
</head>
